<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Invertir Texto</title>
</head>
<body>

    <h2>Invertir cadena de texto</h2>

    <label>Texto original:</label><br>
    <input type="text" id="textoEntrada" placeholder="Escribe aquí"><br><br>

    <button onclick="invertirTexto()">Invertir</button>

    <br><br>

    <label>Texto invertido:</label><br>
    <input type="text" id="textoSalida" readonly>

    <script src="script.js"></script>

</body>
</html>
